name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Directory.Build.props

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Read version
        id: version
        shell: pwsh
        run: |
          [xml]$props = Get-Content -Path 'Directory.Build.props' -Raw
          $version = $props.Project.PropertyGroup.Version | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw 'Directory.Build.props is missing <Version>'
          }

          $version = $version.Trim()
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT
          "asset=dist/OpenClawWindowsCompanion-v$version-win-x64.zip" >> $env:GITHUB_OUTPUT
          "checksum=dist/OpenClawWindowsCompanion-v$version-win-x64.zip.sha256" >> $env:GITHUB_OUTPUT

      - name: Detect version bump
        id: bump
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $before = '${{ github.event.before }}'
          $currentVersion = '${{ steps.version.outputs.version }}'
          $changed = $true

          if ($before -and $before -ne '0000000000000000000000000000000000000000') {
            $oldXml = git show "$before`:Directory.Build.props" 2>$null
            $gitExitCode = $LASTEXITCODE
            if ($gitExitCode -eq 0 -and $oldXml) {
              [xml]$oldProps = $oldXml
              $oldVersion = $oldProps.Project.PropertyGroup.Version | Select-Object -First 1
              if ($oldVersion) {
                $oldVersion = $oldVersion.Trim()
                if ($oldVersion -eq $currentVersion) {
                  $changed = $false
                }
              }
            }
          }

          "changed=$changed" >> $env:GITHUB_OUTPUT
          Write-Host "Version changed: $changed"
          $global:LASTEXITCODE = 0

      - name: Restore dependencies
        if: github.event_name == 'workflow_dispatch' || steps.bump.outputs.changed == 'true'
        run: dotnet restore .\OpenClawWindowsNodeManager.sln

      - name: Run gate
        if: github.event_name == 'workflow_dispatch' || steps.bump.outputs.changed == 'true'
        shell: pwsh
        run: .\scripts\gate.ps1

      - name: Package release assets
        if: github.event_name == 'workflow_dispatch' || steps.bump.outputs.changed == 'true'
        shell: pwsh
        run: .\scripts\package-release.ps1 -Version '${{ steps.version.outputs.version }}'

      - name: Check for existing release
        if: github.event_name == 'workflow_dispatch' || steps.bump.outputs.changed == 'true'
        id: release_exists
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = '${{ steps.version.outputs.tag }}'
          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          $ghExitCode = $LASTEXITCODE

          if ($ghExitCode -eq 0) {
            "exists=true" >> $env:GITHUB_OUTPUT
            Write-Host "Release $tag already exists"
          }
          else {
            "exists=false" >> $env:GITHUB_OUTPUT
            Write-Host "Release $tag does not exist yet"
          }

          $global:LASTEXITCODE = 0

      - name: Create GitHub release
        if: (github.event_name == 'workflow_dispatch' || steps.bump.outputs.changed == 'true') && steps.release_exists.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release create '${{ steps.version.outputs.tag }}' `
            '${{ steps.version.outputs.asset }}' `
            '${{ steps.version.outputs.checksum }}' `
            --repo $env:GITHUB_REPOSITORY `
            --target $env:GITHUB_SHA `
            --title '${{ steps.version.outputs.tag }}' `
            --generate-notes

      - name: Update existing release assets
        if: (github.event_name == 'workflow_dispatch' || steps.bump.outputs.changed == 'true') && steps.release_exists.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release upload '${{ steps.version.outputs.tag }}' `
            '${{ steps.version.outputs.asset }}' `
            '${{ steps.version.outputs.checksum }}' `
            --repo $env:GITHUB_REPOSITORY `
            --clobber
